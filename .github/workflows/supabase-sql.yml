name: Supabase SQL 실행

# supabase/ 폴더의 SQL 파일(또는 직접 입력한 SQL)을 Supabase DB 에 실행한다.
# 마이그레이션 적용(DB 스키마 갱신) 또는 임시 패치 용도.
#
# 사용법
#   GitHub → Actions → "Supabase SQL 실행" → Run workflow
#     · sql_file: 드롭다운에서 supabase/ 하위 파일 선택
#     · raw_sql:  직접 SQL 텍스트 입력 (비어있지 않으면 sql_file 보다 우선)
#
# 실행 방식 (사용 가능한 secret 에 따라 자동 선택, 위 우선순위가 높음)
#   A) psql + SUPABASE_DB_URL  (전체 postgres 접속 문자열)
#   B) psql + SUPABASE_URL(REST) + SUPABASE_DB_PASSWORD (host 자동 구성)
#   C) Supabase Management API + SUPABASE_ACCESS_TOKEN
#      (DB 비밀번호를 모르거나 직접 접속 secret 을 두고 싶지 않을 때)
#
# 참고
#   · SUPABASE_ANON_KEY 로는 DDL(ALTER TABLE 등) 실행이 불가능합니다.
#   · 기존 SUPABASE_URL secret 이 우연히 postgres:// 로 시작하는 접속 문자열이라면
#     A 경로에서 그대로 사용합니다.

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'supabase 폴더 내 실행할 SQL 파일 (raw_sql 비어있을 때 사용)'
        required: false
        type: choice
        default: 'migrations/005_naver_link.sql'
        options:
          - 'migrations/001_create_locations.sql'
          - 'migrations/002_menus_reviews.sql'
          - 'migrations/003_location_comments.sql'
          - 'migrations/004_location_comments_updated_at.sql'
          - 'migrations/005_naver_link.sql'
          - '(raw_sql 사용)'
      raw_sql:
        description: '직접 입력할 SQL (비어있지 않으면 sql_file 보다 우선)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  apply:
    name: SQL 적용
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 체크아웃
        uses: actions/checkout@v5

      - name: 실행할 SQL 본문 준비
        env:
          RAW_SQL: ${{ inputs.raw_sql }}
          SQL_FILE: ${{ inputs.sql_file }}
        run: |
          set -euo pipefail
          if [ -n "${RAW_SQL//[[:space:]]/}" ]; then
            printf '%s\n' "$RAW_SQL" > /tmp/exec.sql
            echo "🟢 raw_sql 입력을 실행합니다."
          elif [ -n "${SQL_FILE:-}" ] && [ "$SQL_FILE" != "(raw_sql 사용)" ]; then
            FILE_PATH="supabase/${SQL_FILE}"
            if [ ! -f "$FILE_PATH" ]; then
              echo "::error::파일을 찾을 수 없습니다: $FILE_PATH"
              exit 1
            fi
            cp "$FILE_PATH" /tmp/exec.sql
            echo "🟢 파일 실행: $FILE_PATH"
          else
            echo "::error::sql_file 또는 raw_sql 중 하나를 지정해주세요."
            exit 1
          fi
          echo "------- 실행할 SQL 미리보기 (최대 40줄) -------"
          head -n 40 /tmp/exec.sql
          echo "------------------------------------------------"

      - name: 실행 경로 선택 (psql | api)
        id: pick
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          DATABASE_URL=""
          METHOD=""

          # 1) 명시적 DB URL secret 이 있으면 psql
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            DATABASE_URL="$SUPABASE_DB_URL"
            METHOD="psql"
            echo "🟢 SUPABASE_DB_URL secret 으로 psql 실행."
          # 2) SUPABASE_URL 이 postgres 접속 문자열이면 psql
          elif [[ "${SUPABASE_URL:-}" == postgres://* || "${SUPABASE_URL:-}" == postgresql://* ]]; then
            DATABASE_URL="$SUPABASE_URL"
            METHOD="psql"
            echo "🟢 SUPABASE_URL 이 postgres 접속 문자열 — psql 실행."
          # 3) REST URL + DB 비밀번호 조합이면 psql
          elif [ -n "${SUPABASE_URL:-}" ] && [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            ref=$(printf '%s' "$SUPABASE_URL" \
              | sed -E 's#^https?://([^./]+)\.supabase\.(co|in).*$#\1#')
            if [ -z "$ref" ] || [ "$ref" = "$SUPABASE_URL" ]; then
              echo "::error::SUPABASE_URL 에서 project ref 추출 실패: $SUPABASE_URL"
              exit 1
            fi
            DATABASE_URL="postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${ref}.supabase.co:5432/postgres?sslmode=require"
            METHOD="psql"
            echo "🟢 SUPABASE_DB_PASSWORD 로 psql 접속 URL 구성 (ref=$ref)."
          # 4) Personal Access Token 이 있으면 Management API
          elif [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_URL:-}" ]; then
            ref=$(printf '%s' "$SUPABASE_URL" \
              | sed -E 's#^https?://([^./]+)\.supabase\.(co|in).*$#\1#')
            if [ -z "$ref" ] || [ "$ref" = "$SUPABASE_URL" ]; then
              echo "::error::SUPABASE_URL 에서 project ref 추출 실패: $SUPABASE_URL"
              exit 1
            fi
            METHOD="api"
            echo "PROJECT_REF=$ref" >> "$GITHUB_ENV"
            echo "🟢 SUPABASE_ACCESS_TOKEN 으로 Management API 실행 (ref=$ref)."
          else
            {
              echo "::error::DB 접속을 위한 secret 이 부족합니다."
              echo ""
              echo "SUPABASE_ANON_KEY 로는 DDL(ALTER TABLE 등) 실행이 불가능합니다."
              echo "다음 중 하나 이상을 GitHub repository secret 으로 추가해주세요."
              echo ""
              echo "  A) SUPABASE_DB_URL — 전체 postgres 접속 문자열 (가장 빠름)"
              echo "  B) SUPABASE_DB_PASSWORD — 비밀번호만 (host 는 자동 추출)"
              echo "  C) SUPABASE_ACCESS_TOKEN — Personal Access Token"
              echo "       https://supabase.com/dashboard/account/tokens"
              echo "       DB 비밀번호를 모르거나 노출하기 싫을 때 추천."
            } >&2
            exit 1
          fi

          if [ "$METHOD" = "psql" ]; then
            echo "::add-mask::$DATABASE_URL"
            [ -n "${SUPABASE_DB_PASSWORD:-}" ] && echo "::add-mask::$SUPABASE_DB_PASSWORD"
            echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          fi
          echo "method=$METHOD" >> "$GITHUB_OUTPUT"

      - name: psql 설치
        if: steps.pick.outputs.method == 'psql'
        run: |
          set -euo pipefail
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y --no-install-recommends postgresql-client >/dev/null
          psql --version

      - name: SQL 실행 (psql)
        if: steps.pick.outputs.method == 'psql'
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" \
            --set ON_ERROR_STOP=1 \
            --single-transaction \
            -f /tmp/exec.sql
          echo "✅ SQL 적용 완료"

      - name: SQL 실행 (Management API)
        if: steps.pick.outputs.method == 'api'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          # SQL 파일 내용을 JSON 으로 안전하게 인코딩.
          PAYLOAD=$(jq -Rs '{query: .}' < /tmp/exec.sql)

          # 응답을 파일로 저장하고 HTTP 상태코드를 별도로 받는다.
          HTTP_CODE=$(curl --silent --show-error \
            --output /tmp/api_response.json \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query")

          echo "HTTP ${HTTP_CODE}"
          echo "------- 응답 본문 -------"
          # JSON 이면 예쁘게, 아니면 그대로.
          jq . /tmp/api_response.json 2>/dev/null || cat /tmp/api_response.json
          echo ""
          echo "-------------------------"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Management API SQL 실행 실패 (HTTP ${HTTP_CODE})"
            exit 1
          fi
          echo "✅ SQL 적용 완료"
