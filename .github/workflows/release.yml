name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: '버전 증가 유형 (Semantic Versioning)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.29.0'
  APP_BUNDLE_ID: 'com.shi.lunchmap'
  IOS_EXPORT_METHOD: 'app-store'  # 필요 시 ad-hoc / development / enterprise 로 변경

jobs:
  prepare:
    name: 버전 계산
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      new_tag: ${{ steps.version.outputs.new_tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
    steps:
      - name: 체크아웃 (전체 히스토리)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 다음 버전 계산
        id: version
        shell: bash
        run: |
          set -euo pipefail
          PREV=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$PREV" ]; then
            CURRENT="0.0.0"
            echo "기존 태그 없음 → 0.0.0 부터 시작"
          else
            CURRENT="${PREV#v}"
            echo "이전 태그: $PREV"
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "🔖 새 버전: ${NEW_TAG}"

  build-android:
    name: Android APK 빌드
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: pubspec.yaml 버전 갱신
        shell: bash
        run: |
          NEW_VERSION="${{ needs.prepare.outputs.new_version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: .env 파일 생성
        shell: bash
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NAVER_MAP_CLIENT_ID=${{ secrets.NAVER_MAP_CLIENT_ID }}
          EOF

      - name: 플랫폼 폴더 보장 (없으면 생성)
        shell: bash
        run: |
          flutter create --platforms=android --org com.shi .

      - name: applicationId 를 com.shi.lunchmap 로 통일
        shell: bash
        run: |
          for f in android/app/build.gradle.kts android/app/build.gradle; do
            [ -f "$f" ] || continue
            sed -i 's/com\.shi\.lunch_map/com.shi.lunchmap/g' "$f"
          done
          # AndroidManifest.xml 의 패키지명도 통일 (구버전 매니페스트 대비)
          sed -i 's/com\.shi\.lunch_map/com.shi.lunchmap/g' android/app/src/main/AndroidManifest.xml || true
          grep -E 'applicationId|namespace' android/app/build.gradle* || true

      - name: build.gradle 의 compileSdk / ndkVersion / minSdk 패치
        shell: bash
        run: |
          # flutter_naver_map 등 플러그인 요구사항을 충족시키기 위해 SDK/NDK 버전을 상향
          # - compileSdk 35 → 36 (flutter_naver_map 요구)
          # - ndkVersion 26.x → 27.0.12077973 (다수 플러그인 요구)
          # - minSdk 21 → 23 (flutter_naver_map 요구)
          python3 - <<'PY'
          import os, re

          for path in ('android/app/build.gradle.kts', 'android/app/build.gradle'):
              if not os.path.exists(path):
                  continue
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              is_kts = path.endswith('.kts')

              def patch(content, key, value, *, quoted=False, kts=is_kts):
                  val = f'"{value}"' if quoted else str(value)
                  if kts:
                      pattern = rf'{key}\s*=\s*[^\n]+'
                      replacement = f'{key} = {val}'
                  else:
                      pattern = rf'{key}\s+[^\n]+'
                      replacement = f'{key} {val}'
                  new_content, n = re.subn(pattern, replacement, content, count=1)
                  return new_content, n

              content, _ = patch(content, 'compileSdk' if is_kts else 'compileSdkVersion', 36)
              content, n = patch(content, 'ndkVersion', '27.0.12077973', quoted=True)
              if n == 0:
                  # ndkVersion 라인이 없으면 compileSdk 다음 줄에 삽입
                  if is_kts:
                      content = re.sub(
                          r'(compileSdk\s*=\s*[^\n]+\n)',
                          r'\1    ndkVersion = "27.0.12077973"\n',
                          content,
                          count=1,
                      )
                  else:
                      content = re.sub(
                          r'(compileSdkVersion\s+[^\n]+\n)',
                          r'\1    ndkVersion "27.0.12077973"\n',
                          content,
                          count=1,
                      )
              content, _ = patch(content, 'minSdk' if is_kts else 'minSdkVersion', 23)

              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f'✅ {path} 패치 완료')
          PY
          grep -E 'compileSdk|ndkVersion|minSdk' android/app/build.gradle* || true

      - name: AndroidManifest.xml 에 Naver Client ID 주입
        shell: bash
        env:
          NAVER_MAP_CLIENT_ID: ${{ secrets.NAVER_MAP_CLIENT_ID }}
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'com.naver.maps.map.CLIENT_ID' "$MANIFEST"; then
            python3 - <<'PY'
          import os, re
          path = 'android/app/src/main/AndroidManifest.xml'
          cid = os.environ['NAVER_MAP_CLIENT_ID']
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          meta = (
              f'        <meta-data\n'
              f'            android:name="com.naver.maps.map.CLIENT_ID"\n'
              f'            android:value="{cid}" />\n'
          )
          content = re.sub(r'(<application[^>]*>)', r'\1\n' + meta, content, count=1)
          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
          PY
          fi

      - name: 인터넷 권한 보장
        shell: bash
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i '0,/<application/{s|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <application|}' "$MANIFEST"
          fi

      - run: flutter pub get

      - run: flutter build apk --release

      - name: 산출물 이름 변경
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/lunch-map-${{ needs.prepare.outputs.new_version }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/lunch-map-*-android.apk
          if-no-files-found: error

  build-ios:
    name: iOS IPA 빌드 (서명)
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Xcode 버전 선택 (iOS 26 SDK 사용 – App Store 업로드 요구사항)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # App Store Connect 는 iOS 26 SDK(Xcode 26+) 빌드만 수락하므로 최신 안정 버전 사용
          xcode-version: latest-stable

      - name: 선택된 Xcode / iOS SDK 확인
        shell: bash
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --show-sdk-build-version

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: pubspec.yaml 버전 갱신
        shell: bash
        run: |
          NEW_VERSION="${{ needs.prepare.outputs.new_version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          sed -i '' "s/^version: .*/version: ${NEW_VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: .env 파일 생성
        shell: bash
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NAVER_MAP_CLIENT_ID=${{ secrets.NAVER_MAP_CLIENT_ID }}
          EOF

      - name: 플랫폼 폴더 보장 (없으면 생성)
        shell: bash
        run: |
          flutter create --platforms=ios --org com.shi .

      - name: PRODUCT_BUNDLE_IDENTIFIER 를 com.shi.lunchmap 로 통일
        shell: bash
        run: |
          # flutter create 가 lunchMap(camelCase) 또는 lunch_map 으로 생성할 수 있으므로 두 경우 모두 처리
          sed -i '' 's/com\.shi\.lunchMap/com.shi.lunchmap/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/com\.shi\.lunch_map/com.shi.lunchmap/g' ios/Runner.xcodeproj/project.pbxproj
          grep -c 'com.shi.lunchmap' ios/Runner.xcodeproj/project.pbxproj || true

      - name: Podfile - Pod 타겟 코드 서명 비활성화
        shell: bash
        run: |
          # Manual 코드 서명 설정이 Pod 타겟에 전파되는 것을 방지
          # post_install 훅에서 Pod 타겟은 Automatic 으로 재설정
          python3 << 'PYEOF'
          import re

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          new_post_install = '''post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'No'
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              end
            end
          end'''

          content = re.sub(
              r'post_install do \|installer\|.*?^end',
              new_post_install,
              content,
              flags=re.DOTALL | re.MULTILINE,
          )

          with open('ios/Podfile', 'w') as f:
              f.write(content)

          print('✅ Podfile 패치 완료')
          PYEOF

      - name: Info.plist 에 Naver Client ID / 권한 주입
        shell: bash
        env:
          NAVER_MAP_CLIENT_ID: ${{ secrets.NAVER_MAP_CLIENT_ID }}
        run: |
          PLIST=ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Delete :NMFClientId" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NMFClientId string ${NAVER_MAP_CLIENT_ID}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :NSLocationWhenInUseUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string '현재 위치를 표시하기 위해 위치 권한이 필요합니다.'" "$PLIST"

      - name: 임시 키체인 생성 + 배포 인증서 import
        shell: bash
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_DIST_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/dist_cert.p12"
          security import "$RUNNER_TEMP/dist_cert.p12" \
            -P "$IOS_DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          rm -f "$RUNNER_TEMP/dist_cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: 프로비저닝 프로파일 설치 + UUID/Name 추출
        id: profile
        shell: bash
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"

          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")

          cp "$RUNNER_TEMP/profile.mobileprovision" "$PP_DIR/$UUID.mobileprovision"

          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "📄 프로파일: $NAME ($UUID)"

      - name: ExportOptions.plist 생성
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ env.IOS_EXPORT_METHOD }}</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.APP_BUNDLE_ID }}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          cat ios/ExportOptions.plist

      - name: Xcode 수동 코드 서명 설정
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
        run: |
          set -euo pipefail
          PBXPROJ=ios/Runner.xcodeproj/project.pbxproj

          echo "=== 수정 전 서명 관련 설정 ==="
          grep -n 'CODE_SIGN\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE' "$PBXPROJ" | head -30 || true

          python3 << 'PYEOF'
          import re, os, sys

          pbxproj_path = 'ios/Runner.xcodeproj/project.pbxproj'
          team_id = os.environ['APPLE_TEAM_ID']
          profile_name = os.environ['PROFILE_NAME']

          with open(pbxproj_path, 'r') as f:
              content = f.read()

          def replace_or_inject(text, key, value, quoted=True):
              """기존 설정을 교체하고, 없으면 buildSettings 블록에 삽입"""
              val_str = f'"{value}"' if quoted else value
              pattern = rf'{key}\s*=\s*(?:"[^"]*"|\w+)\s*;'
              replacement = f'{key} = {val_str};'
              new_text, n = re.subn(pattern, replacement, text)
              if n == 0:
                  new_text = re.sub(
                      r'(buildSettings\s*=\s*\{)',
                      rf'\1\n\t\t\t\t{replacement}',
                      text,
                  )
                  print(f"WARNING: {key} not found — injected into buildSettings blocks")
              return new_text

          content = replace_or_inject(content, 'CODE_SIGN_STYLE', 'Manual', quoted=False)
          content = replace_or_inject(content, 'DEVELOPMENT_TEAM', team_id)
          content = replace_or_inject(content, 'CODE_SIGN_IDENTITY', 'iPhone Distribution')
          content = replace_or_inject(content, 'PROVISIONING_PROFILE_SPECIFIER', profile_name)

          with open(pbxproj_path, 'w') as f:
              f.write(content)

          print(f"✅ pbxproj 수정 완료 — TEAM: {team_id}, PROFILE: {profile_name}")
          PYEOF

          echo "=== 수정 후 서명 관련 설정 ==="
          grep -n 'CODE_SIGN\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE' "$PBXPROJ" | head -30 || true

      - run: flutter pub get

      - name: flutter build ipa
        shell: bash
        env:
          PROFILE_UUID: ${{ steps.profile.outputs.uuid }}
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # FLUTTER_XCODE_CODE_SIGN_STYLE / CODE_SIGN_IDENTITY / PROVISIONING_PROFILE_SPECIFIER 를
          # 환경변수로 설정하면 xcodebuild 커맨드라인 빌드 설정으로 전달되어 Pod 타겟을 포함한
          # 모든 타겟에 최상위 우선순위로 강제 적용된다.
          # Runner 타겟 서명 설정은 "Xcode 수동 코드 서명 설정" 단계에서 pbxproj 에만 적용하므로
          # 여기서는 팀 ID 만 전달한다.
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: 산출물 이름 변경
        shell: bash
        run: |
          set -euo pipefail

          echo "=== build/ios 구조 ==="
          ls -la build/ios/ 2>/dev/null || true

          # flutter build ipa 가 export 단계에서 조용히 실패해
          # build/ios/ipa 가 생성되지 않을 수 있으므로,
          # 그런 경우 xcarchive 에서 직접 -exportArchive 를 수행한다.
          if [ ! -d build/ios/ipa ] || [ -z "$(find build/ios/ipa -maxdepth 1 -name '*.ipa' -print -quit)" ]; then
            echo "::warning::build/ios/ipa 에 IPA 가 없습니다. xcarchive 에서 직접 export 합니다."
            ARCHIVE=$(find build/ios/archive -maxdepth 1 -name '*.xcarchive' | head -n1)
            if [ -z "$ARCHIVE" ]; then
              echo "::error::xcarchive 를 찾을 수 없습니다. flutter build ipa 가 archive 단계부터 실패했을 가능성이 큽니다."
              find build -maxdepth 4 -type d 2>/dev/null || true
              exit 1
            fi

            mkdir -p build/ios/ipa
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE" \
              -exportPath build/ios/ipa \
              -exportOptionsPlist ios/ExportOptions.plist
          fi

          IPA=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n1)
          if [ -z "$IPA" ]; then
            echo "::error::IPA 파일을 찾을 수 없습니다."
            ls -la build/ios/ipa/ 2>/dev/null || true
            exit 1
          fi

          mv "$IPA" "build/ios/ipa/lunch-map-${{ needs.prepare.outputs.new_version }}-ios.ipa"
          echo "✅ 이름 변경: $(basename "$IPA") → lunch-map-${{ needs.prepare.outputs.new_version }}-ios.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/lunch-map-*-ios.ipa
          if-no-files-found: error

      - name: 키체인 정리
        if: always()
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  build-windows:
    name: Windows EXE 빌드
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: pubspec.yaml 버전 갱신
        shell: pwsh
        run: |
          $newVersion = "${{ needs.prepare.outputs.new_version }}"
          $buildNumber = "${{ github.run_number }}"
          (Get-Content pubspec.yaml) -replace '^version: .*', "version: $newVersion+$buildNumber" | Set-Content pubspec.yaml
          Select-String -Path pubspec.yaml -Pattern '^version:'

      - name: .env 파일 생성
        shell: pwsh
        run: |
          @"
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          NAVER_MAP_CLIENT_ID=${{ secrets.NAVER_MAP_CLIENT_ID }}
          "@ | Set-Content -Encoding UTF8 .env

      - name: 플랫폼 폴더 보장 (없으면 생성)
        shell: pwsh
        run: flutter create --platforms=windows --org com.shi .

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Release 폴더 압축
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.new_version }}"
          $src = "build\windows\x64\runner\Release"
          $dst = "lunch-map-$version-windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: lunch-map-*-windows.zip
          if-no-files-found: error

  release:
    name: 릴리즈 생성
    needs: [prepare, build-android, build-ios, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃 (전체 히스토리)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 산출물 다운로드
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 산출물 평탄화
        shell: bash
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.apk' -o -name '*.ipa' -o -name '*.zip' \) -exec cp {} release-files/ \;
          ls -lh release-files

      - name: 변경 사항 본문 생성
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          PREV="${{ needs.prepare.outputs.previous_tag }}"
          NEW_TAG="${{ needs.prepare.outputs.new_tag }}"
          {
            echo "## 📦 산출물"
            echo
            echo "| 플랫폼 | 파일 |"
            echo "| --- | --- |"
            echo "| Android | \`lunch-map-${{ needs.prepare.outputs.new_version }}-android.apk\` |"
            echo "| iOS | \`lunch-map-${{ needs.prepare.outputs.new_version }}-ios.ipa\` (${{ env.IOS_EXPORT_METHOD }} 서명) |"
            echo "| Windows | \`lunch-map-${{ needs.prepare.outputs.new_version }}-windows.zip\` |"
            echo
            echo "## 📝 변경 사항"
            echo
            if [ -z "$PREV" ]; then
              echo "최초 릴리즈 — 전체 커밋:"
              echo
              git log --pretty=format:'- %s (%h) — @%an' >> release_body.md.tmp
            else
              echo "[\`$PREV\` ... \`$NEW_TAG\`](${{ github.server_url }}/${{ github.repository }}/compare/${PREV}...${NEW_TAG}) 사이의 변경 사항:"
              echo
              git log "${PREV}..HEAD" --pretty=format:'- %s (%h) — @%an' >> release_body.md.tmp
            fi
            cat release_body.md.tmp
            echo
          } > release_body.md
          rm -f release_body.md.tmp
          echo "BODY_PATH=release_body.md" >> "$GITHUB_OUTPUT"

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.new_tag }}
          name: 🚀 lunch-map ${{ needs.prepare.outputs.new_tag }}
          body_path: ${{ steps.changelog.outputs.BODY_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-files/*.apk
            release-files/*.ipa
            release-files/*.zip
          fail_on_unmatched_files: true

  submit-testflight:
    name: iOS TestFlight 빌드 제출
    needs: [prepare, build-ios, release]
    runs-on: macos-latest
    steps:
      - name: iOS IPA 다운로드
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ipa

      - name: App Store Connect API 키 배치
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_API_KEY_BASE64}" ] || \
             [ -z "${APP_STORE_CONNECT_API_KEY_ID}" ] || \
             [ -z "${APP_STORE_CONNECT_API_ISSUER_ID}" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_BASE64 / APP_STORE_CONNECT_API_KEY_ID / APP_STORE_CONNECT_API_ISSUER_ID 시크릿이 모두 설정되어야 합니다."
            exit 1
          fi
          # altool 은 ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8 경로의 키를 자동 탐색
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "${APP_STORE_CONNECT_API_KEY_BASE64}" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "✅ API 키 배치 완료: $KEY_PATH"

      - name: TestFlight 업로드 (altool)
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA=$(find ipa -maxdepth 2 -name '*.ipa' | head -n1)
          if [ -z "$IPA" ]; then
            echo "::error::IPA 파일을 찾을 수 없습니다."
            ls -laR ipa 2>/dev/null || true
            exit 1
          fi
          echo "📤 TestFlight 업로드 대상: $IPA"

          # 1) 사전 검증
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

          # 2) App Store Connect 업로드 → TestFlight 처리 자동 진행
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

          echo "✅ TestFlight 업로드 요청 완료. App Store Connect 의 처리(인코딩/심사 전 검증)에는 수 분이 소요될 수 있습니다."

      - name: API 키 정리
        if: always()
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" || true
